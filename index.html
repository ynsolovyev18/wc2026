<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ЧМ-2026 · Тотализатор</title>
<style>
:root{
  --bg:#0a1c13; --card:#122b1d; --card2:#0e2418; --line:#1f4530;
  --gold:#e8c46b; --txt:#e9f2ec; --mut:#8fae9c;
  --tA:#e8c46b; --tB:#8fb4d9; --tC:#7fd49a;
  --red:#e07a6a; --ok:#7fd49a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(1200px 600px at 50% -100px,#16402a 0%,var(--bg) 60%);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;padding-bottom:60px}
.wrap{max-width:980px;margin:0 auto;padding:0 14px}
header{padding:24px 0 8px;text-align:center}
header h1{font-size:25px;letter-spacing:.5px}
header .sub{color:var(--mut);font-size:13px;margin-top:4px}
.bank{display:inline-block;margin:10px 4px 0;background:var(--card);border:1px solid var(--line);
  border-radius:30px;padding:6px 16px;font-size:13px}
.bank b{color:var(--gold)}
nav{display:flex;gap:6px;justify-content:center;margin:14px 0;flex-wrap:wrap}
nav button{background:var(--card);color:var(--mut);border:1px solid var(--line);border-radius:10px;
  padding:9px 16px;font-size:14px;cursor:pointer}
nav button.on{background:var(--gold);color:#1c1604;font-weight:600;border-color:var(--gold)}
nav button:disabled{opacity:.35;cursor:not-allowed}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
.card h2{font-size:17px;margin-bottom:10px}
.card h3{font-size:14px;color:var(--mut);margin:12px 0 6px}
.hint{color:var(--mut);font-size:13px;line-height:1.5}
.btn{background:var(--gold);color:#1c1604;border:none;border-radius:10px;padding:10px 18px;
  font-size:14px;font-weight:600;cursor:pointer}
.btn.sec{background:var(--card2);color:var(--txt);border:1px solid var(--line);font-weight:400}
.btn.danger{background:transparent;color:var(--red);border:1px solid var(--red)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.mini{padding:4px 10px;font-size:13px;border-radius:8px}
input[type=text],input[type=number],textarea{background:var(--card2);border:1px solid var(--line);
  color:var(--txt);border-radius:8px;padding:9px 10px;font-size:14px;width:100%}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.fld{margin-bottom:8px}
.fld label{display:block;font-size:12px;color:var(--mut);margin-bottom:3px}
.tierbadge{display:inline-block;font-size:11px;font-weight:700;border-radius:6px;padding:1px 7px;color:#10210f}
.bA{background:var(--tA)} .bB{background:var(--tB)} .bC{background:var(--tC)}
.teamgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:7px;margin-top:8px}
.tbtn{display:flex;align-items:center;gap:7px;background:var(--card2);border:1px solid var(--line);
  border-radius:10px;padding:8px 10px;font-size:13px;color:var(--txt);cursor:pointer;text-align:left}
.tbtn:hover:not(:disabled){border-color:var(--gold)}
.tbtn:disabled{opacity:.45;cursor:default}
.tbtn .fl{font-size:18px;flex:none}
.tbtn .own{margin-left:auto;font-size:11px;color:var(--gold);flex:none}
.tbtn.taken{opacity:.45}
.turn{background:var(--card2);border:1px dashed var(--gold);border-radius:12px;padding:12px 14px;
  margin-bottom:12px;font-size:15px}
.turn b{color:var(--gold)}
.turn.me{border-style:solid;box-shadow:0 0 16px rgba(232,196,107,.18)}
.lb{display:flex;flex-direction:column;gap:10px}
.pcard{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.pcard.lead{border-color:var(--gold);box-shadow:0 0 18px rgba(232,196,107,.12)}
.phead{display:flex;align-items:baseline;gap:10px;flex-wrap:nowrap}
.phead .rank{font-size:18px;width:26px;flex:none}
.phead .nm{font-size:16px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.phead .pts{margin-left:auto;flex:none;white-space:nowrap;font-size:22px;font-weight:700;color:var(--gold)}
.phead .pts small{font-size:12px;color:var(--mut);font-weight:400}
.psub{color:var(--mut);font-size:13px;line-height:1.4;margin-top:1px}
.pbody{display:flex;gap:14px;align-items:flex-start;margin-top:10px}
.pcol{flex:1;min-width:0}
.chips.stack{flex-direction:column;flex-wrap:nowrap;margin-top:0}
.pav{flex-shrink:0;align-self:flex-start;width:112px;height:112px;border-radius:50%;background-size:cover;border:2px solid var(--gold)}
.chips{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);
  border-radius:20px;padding:4px 11px;font-size:13px}
.chip .p{color:var(--gold);font-weight:600}
.chip .st{color:var(--mut);font-size:11px}
.syncbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.msg{font-size:13px;color:var(--ok);margin-top:6px}
.msg.err{color:var(--red)}
details{margin-top:10px}
summary{cursor:pointer;color:var(--mut);font-size:14px;padding:6px 0}
table.ptable{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.ptable th,.ptable td{border:1px solid var(--line);padding:6px 8px;text-align:center}
.ptable td:first-child,.ptable th:first-child{text-align:left}
.ptable th{color:var(--mut);font-weight:500}
.mrow{display:flex;align-items:center;gap:8px;padding:8px 6px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.mrow:last-child{border-bottom:none}
.mrow .tnm{min-width:170px;font-size:14px}
.cnt{display:inline-flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--line);
  border-radius:8px;padding:2px 4px;font-size:12px}
.cnt button{background:none;border:none;color:var(--gold);font-size:15px;cursor:pointer;width:20px}
.cnt .v{min-width:14px;text-align:center}
.cnt .l{color:var(--mut)}
.stchips{display:flex;gap:4px;flex-wrap:wrap}
.stchips button{background:var(--card);border:1px solid var(--line);color:var(--mut);border-radius:7px;
  padding:3px 8px;font-size:12px;cursor:pointer}
.stchips button.on{background:var(--ok);color:#10210f;border-color:var(--ok);font-weight:600}
.mlist{font-size:13px;color:var(--mut);max-height:300px;overflow-y:auto}
.mlist div{padding:4px 0;border-bottom:1px solid var(--line)}
.stagepill{font-size:10px;border:1px solid var(--line);border-radius:5px;padding:1px 5px;margin-right:6px}
.flg{width:22px;height:auto;border-radius:2px;box-shadow:0 0 0 1px rgba(255,255,255,.18);vertical-align:-3px}
.mp{background:linear-gradient(180deg,#15331f 0%,var(--card) 100%);border-color:#2c5a3c}
.seg{border-top:1px solid var(--line);padding:10px 0;font-size:14px;line-height:1.6}
.seg:first-of-type{border-top:none}
.seghead{font-weight:600;margin-bottom:4px;color:var(--gold)}
.plist{list-style:none}
.plist li{display:flex;align-items:center;gap:8px;padding:7px 4px;border-bottom:1px solid var(--line);font-size:15px}
.plist li:last-child{border-bottom:none}
.tag{font-size:11px;border:1px solid var(--line);border-radius:6px;padding:1px 6px;color:var(--mut)}
.tag.adm{color:var(--gold);border-color:var(--gold)}
.code{font-family:ui-monospace,Menlo,monospace;background:var(--card2);border:1px dashed var(--line);
  border-radius:8px;padding:8px 12px;font-size:14px;word-break:break-all;user-select:all}
.cols2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.cols2{grid-template-columns:1fr}.mrow .tnm{min-width:100%}}
footer{margin-top:30px;text-align:center;color:var(--mut);font-size:12px}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>⚽ ЧМ-2026 · Дружеский тотализатор</h1>
  <div class="sub">11 июня — 19 июля 2026 · США / Канада / Мексика</div>
  <div id="hdr"></div>
</header>
<nav id="tabs"></nav>
<main id="app"></main>
<footer>Очки считаются автоматически · матчи: ESPN · комната: бесплатное JSON-облако</footer>
</div>

<script>
"use strict";
/* ================= СПРАВОЧНИКИ ================= */
const P = {
  gw:{A:2,B:3,C:4}, gd:{A:1,B:1,C:2}, ko:{A:2,B:4,C:6},
  w32:{A:3,B:5,C:7}, w16:{A:5,B:7,C:10}, wqf:{A:8,B:11,C:15},
  wsf:{A:12,B:16,C:21}, wf:{A:18,B:23,C:30}
};
const STAGE_KEYS = ['ko','w32','w16','wqf','wsf','wf'];
const STAGE_LBL = {ko:'плей-офф', w32:'1/8 финала', w16:'1/4 финала', wqf:'полуфинал', wsf:'финал', wf:'чемпион 🏆'};
function finalReached(){return (G.matches||[]).some(function(m){return m&&m.st==='final';});}
const TIER_NAME = {A:'Фавориты', B:'Претенденты', C:'Тёмные лошадки'};

const TEAMS = [
 {id:'esp',ru:'Испания',en:'Spain',fl:'🇪🇸',gr:'H',tier:'A'},
 {id:'fra',ru:'Франция',en:'France',fl:'🇫🇷',gr:'I',tier:'A'},
 {id:'eng',ru:'Англия',en:'England',fl:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',gr:'L',tier:'A'},
 {id:'bra',ru:'Бразилия',en:'Brazil',fl:'🇧🇷',gr:'C',tier:'A'},
 {id:'arg',ru:'Аргентина',en:'Argentina',fl:'🇦🇷',gr:'J',tier:'A'},
 {id:'por',ru:'Португалия',en:'Portugal',fl:'🇵🇹',gr:'K',tier:'A'},
 {id:'ger',ru:'Германия',en:'Germany',fl:'🇩🇪',gr:'E',tier:'B'},
 {id:'ned',ru:'Нидерланды',en:'Netherlands',fl:'🇳🇱',gr:'F',tier:'B'},
 {id:'nor',ru:'Норвегия',en:'Norway',fl:'🇳🇴',gr:'I',tier:'B'},
 {id:'bel',ru:'Бельгия',en:'Belgium',fl:'🇧🇪',gr:'G',tier:'B'},
 {id:'col',ru:'Колумбия',en:'Colombia',fl:'🇨🇴',gr:'K',tier:'B'},
 {id:'mar',ru:'Марокко',en:'Morocco',fl:'🇲🇦',gr:'C',tier:'B'},
 {id:'uru',ru:'Уругвай',en:'Uruguay',fl:'🇺🇾',gr:'H',tier:'B'},
 {id:'usa',ru:'США',en:'United States',fl:'🇺🇸',gr:'D',tier:'C'},
 {id:'sui',ru:'Швейцария',en:'Switzerland',fl:'🇨🇭',gr:'B',tier:'C'},
 {id:'jpn',ru:'Япония',en:'Japan',fl:'🇯🇵',gr:'F',tier:'C'},
 {id:'mex',ru:'Мексика',en:'Mexico',fl:'🇲🇽',gr:'A',tier:'C'},
 {id:'cro',ru:'Хорватия',en:'Croatia',fl:'🇭🇷',gr:'L',tier:'C'},
 {id:'ecu',ru:'Эквадор',en:'Ecuador',fl:'🇪🇨',gr:'E',tier:'C'},
 {id:'sen',ru:'Сенегал',en:'Senegal',fl:'🇸🇳',gr:'I',tier:'C'},
 {id:'swe',ru:'Швеция',en:'Sweden',fl:'🇸🇪',gr:'F',tier:'C'},
 {id:'cze',ru:'Чехия',en:'Czechia',fl:'🇨🇿',gr:'A',tier:'C'},
 {id:'kor',ru:'Южная Корея',en:'South Korea',fl:'🇰🇷',gr:'A',tier:'C'},
 {id:'rsa',ru:'ЮАР',en:'South Africa',fl:'🇿🇦',gr:'A',tier:'C'},
 {id:'bih',ru:'Босния и Герц.',en:'Bosnia-Herzegovina',fl:'🇧🇦',gr:'B',tier:'C'},
 {id:'can',ru:'Канада',en:'Canada',fl:'🇨🇦',gr:'B',tier:'C'},
 {id:'qat',ru:'Катар',en:'Qatar',fl:'🇶🇦',gr:'B',tier:'C'},
 {id:'hai',ru:'Гаити',en:'Haiti',fl:'🇭🇹',gr:'C',tier:'C'},
 {id:'sco',ru:'Шотландия',en:'Scotland',fl:'🏴󠁧󠁢󠁳󠁣󠁴󠁿',gr:'C',tier:'C'},
 {id:'aus',ru:'Австралия',en:'Australia',fl:'🇦🇺',gr:'D',tier:'C'},
 {id:'par',ru:'Парагвай',en:'Paraguay',fl:'🇵🇾',gr:'D',tier:'C'},
 {id:'tur',ru:'Турция',en:'Türkiye',fl:'🇹🇷',gr:'D',tier:'C'},
 {id:'cuw',ru:'Кюрасао',en:'Curaçao',fl:'🇨🇼',gr:'E',tier:'C'},
 {id:'civ',ru:'Кот-д’Ивуар',en:'Ivory Coast',fl:'🇨🇮',gr:'E',tier:'C'},
 {id:'tun',ru:'Тунис',en:'Tunisia',fl:'🇹🇳',gr:'F',tier:'C'},
 {id:'egy',ru:'Египет',en:'Egypt',fl:'🇪🇬',gr:'G',tier:'C'},
 {id:'irn',ru:'Иран',en:'Iran',fl:'🇮🇷',gr:'G',tier:'C'},
 {id:'nzl',ru:'Новая Зеландия',en:'New Zealand',fl:'🇳🇿',gr:'G',tier:'C'},
 {id:'cpv',ru:'Кабо-Верде',en:'Cape Verde',fl:'🇨🇻',gr:'H',tier:'C'},
 {id:'ksa',ru:'Сауд. Аравия',en:'Saudi Arabia',fl:'🇸🇦',gr:'H',tier:'C'},
 {id:'irq',ru:'Ирак',en:'Iraq',fl:'🇮🇶',gr:'I',tier:'C'},
 {id:'alg',ru:'Алжир',en:'Algeria',fl:'🇩🇿',gr:'J',tier:'C'},
 {id:'aut',ru:'Австрия',en:'Austria',fl:'🇦🇹',gr:'J',tier:'C'},
 {id:'jor',ru:'Иордания',en:'Jordan',fl:'🇯🇴',gr:'J',tier:'C'},
 {id:'cod',ru:'ДР Конго',en:'Congo DR',fl:'🇨🇩',gr:'K',tier:'C'},
 {id:'uzb',ru:'Узбекистан',en:'Uzbekistan',fl:'🇺🇿',gr:'K',tier:'C'},
 {id:'gha',ru:'Гана',en:'Ghana',fl:'🇬🇭',gr:'L',tier:'C'},
 {id:'pan',ru:'Панама',en:'Panama',fl:'🇵🇦',gr:'L',tier:'C'}
];
const T = {}; TEAMS.forEach(t=>T[t.id]=t);
const ISO={esp:'es',fra:'fr',eng:'gb-eng',bra:'br',arg:'ar',por:'pt',ger:'de',ned:'nl',nor:'no',
 bel:'be',col:'co',mar:'ma',uru:'uy',usa:'us',sui:'ch',jpn:'jp',mex:'mx',cro:'hr',ecu:'ec',
 sen:'sn',swe:'se',cze:'cz',kor:'kr',rsa:'za',bih:'ba',can:'ca',qat:'qa',hai:'ht',sco:'gb-sct',
 aus:'au',par:'py',tur:'tr',cuw:'cw',civ:'ci',tun:'tn',egy:'eg',irn:'ir',nzl:'nz',cpv:'cv',
 ksa:'sa',irq:'iq',alg:'dz',aut:'at',jor:'jo',cod:'cd',uzb:'uz',gha:'gh',pan:'pa'};
TEAMS.forEach(t=>{t.iso=ISO[t.id];});
function flagHtml(t){
  return '<img class="flg" src="https://flagcdn.com/24x18/'+t.iso+'.png" srcset="https://flagcdn.com/48x36/'+t.iso+'.png 2x" alt="" onerror="this.replaceWith(\''+t.fl+'\')">';
}

function norm(s){return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'')
  .replace(/['’.]/g,'').replace(/\s+/g,' ').trim();}
const EN2ID = {}; TEAMS.forEach(t=>EN2ID[norm(t.en)]=t.id);
const ALIASES = {'usa':'usa','united states':'usa','turkey':'tur','czech republic':'cze',
 'korea republic':'kor','cote divoire':'civ','cabo verde':'cpv','dr congo':'cod',
 'democratic republic of the congo':'cod','bosnia and herzegovina':'bih','bosnia herzegovina':'bih',
 'curacao':'cuw'};
function matchTeam(name){const k=norm(name);return EN2ID[k]||ALIASES[k]||null;}

/* ================= СОСТОЯНИЕ ================= */
const KEY='wc2026-pub-v2';
let LS={room:'',myName:'',tab:'lobby'};
let G=null;
let msg='',msgErr=false,pendingPush=false;

function defGame(){return {v:2,rev:0,updated:0,admin:'',fee:5000,regOpen:true,lateOpen:false,phase:'lobby',
  players:[],order:[],picks:{},pickLog:[],res:{},matches:[],koFix:[],lastSync:null};}
function loadLocal(){
  try{const raw=localStorage.getItem(KEY);
    if(raw){const o=JSON.parse(raw);LS.room=o.room||'';LS.myName=o.myName||'';LS.tab=o.tab||'lobby';
      if(o.G)G=Object.assign(defGame(),o.G);}
  }catch(e){}
}
function saveLocal(){try{localStorage.setItem(KEY,JSON.stringify({room:LS.room,myName:LS.myName,tab:LS.tab,G:G}));}catch(e){}}
function setMsg(m,err){msg=m;msgErr=!!err;}

/* ================= ОБЛАКО ================= */
const JB='https://jsonblob.com/api/jsonBlob';
function roomUrl(code){
  if(code.indexOf('jb-')===0)return JB+'/'+code.slice(3);
  if(code.indexOf('kv-')===0)return 'https://kvdb.io/'+code.slice(3)+'/state';
  return null;
}
async function cloudCreate(g,email){
  const r=await fetch('https://kvdb.io',{method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:'email='+encodeURIComponent(email)});
  if(!r.ok)throw new Error('хранилище недоступно (HTTP '+r.status+')');
  const b=(await r.text()).trim();
  if(!/^[A-Za-z0-9]{10,40}$/.test(b))throw new Error('хранилище вернуло ошибку: '+b.slice(0,120));
  const r2=await fetch('https://kvdb.io/'+b+'/state',{method:'PUT',body:JSON.stringify(g)});
  if(!r2.ok){
    const msg=(await r2.text()).slice(0,200);
    if(msg.indexOf('not verified')>=0)throw new Error('kvdb.io отправил вам письмо для подтверждения email. Откройте почту (проверьте и спам), кликните ссылку активации — и создайте комнату ещё раз');
    throw new Error('не удалось записать игру: '+msg);
  }
  return 'kv-'+b;
}
async function cloudGet(code){
  const u=roomUrl(code);if(!u)throw new Error('неверный код комнаты');
  const r=await fetch(u+'?_='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}
async function cloudPut(code,g){
  const u=roomUrl(code);
  const r=await fetch(u,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(g)});
  if(!r.ok)throw new Error('HTTP '+r.status);
}
async function push(){
  if(!LS.room){saveLocal();return;}
  try{await cloudPut(LS.room,G);pendingPush=false;}
  catch(e){pendingPush=true;setMsg('Облако недоступно — изменение сохранено локально, отправлю при следующей синхронизации.',true);render();}
  saveLocal();
}
async function pull(loud){
  if(!LS.room)return;
  try{
    const remote=await cloudGet(LS.room);
    if(!G||(remote.rev||0)>(G.rev||0)){G=Object.assign(defGame(),remote);saveLocal();render();}
    else if(pendingPush||(remote.rev||0)<(G.rev||0)){await cloudPut(LS.room,G);pendingPush=false;saveLocal();}
    if(G&&G.phase==='play'&&!upcomingMatches.length)fetchUpcoming();
    if(loud){setMsg('Синхронизировано.');render();}
  }catch(e){if(loud){setMsg('Не удалось связаться с комнатой: '+e.message,true);render();}}
}
async function mutate(fn){
  if(LS.room){try{const remote=await cloudGet(LS.room);if((remote.rev||0)>(G.rev||0))G=Object.assign(defGame(),remote);}catch(e){}}
  fn(G);
  G.rev=(G.rev||0)+1;G.updated=Date.now();
  saveLocal();render();
  if(LS.room)push();
}

/* ================= РОЛИ ================= */
function isAdmin(){return !!G&&(!LS.room||(LS.myName&&G.admin===LS.myName));}
function myIdx(){if(!G||!LS.myName)return -1;return G.players.findIndex(p=>p.name===LS.myName);}

/* ================= ОЧКИ ================= */
function getRes(tid){if(!G.res[tid])G.res[tid]={gw:0,gd:0,ko:false,w32:false,w16:false,wqf:false,wsf:false,wf:false};return G.res[tid];}
function lastMatchPts(tid){
  const t=T[tid];if(!t)return null;
  const ms=(G.matches||[]).filter(function(m){return m.a===tid||m.b===tid;});
  if(!ms.length)return null;
  ms.sort(function(a,b){return a.d<b.d?-1:a.d>b.d?1:0;});
  const m=ms[ms.length-1];const tier=t.tier;let p=0;
  if(m.st==='group'){if(m.w===tid)p=P.gw[tier];else if(!m.w)p=P.gd[tier];else p=0;}
  else{if(m.st==='r32')p+=(P.ko&&P.ko[tier])||0;const key={r32:'w32',r16:'w16',qf:'wqf',sf:'wsf','final':'wf'}[m.st];if(m.w===tid&&key)p+=(P[key]&&P[key][tier])||0;}
  return p;
}
function teamPoints(tid){
  const t=T[tid],r=(G&&G.res[tid])||{};
  let p=(r.gw||0)*P.gw[t.tier]+(r.gd||0)*P.gd[t.tier];
  STAGE_KEYS.forEach(k=>{if(r[k])p+=P[k][t.tier];});
  return p;
}
function teamStageLabel(tid){
  const r=(G&&G.res[tid])||{};

function draftSeq(){
  const out=[];if(!G||!G.order.length)return out;
  [['A',1],['B',-1],['C',1]].forEach(rt=>{
    const o=rt[1]>0?G.order:G.order.slice().reverse();
    o.forEach(p=>out.push({p:p,t:rt[0]}));
  });
  return out;
}
function curPick(){const sq=draftSeq();return G.pickLog.length<sq.length?sq[G.pickLog.length]:null;}
function canPickNow(){
  const cp=curPick();if(!cp)return false;
  if(!LS.room)return true;
  if(isAdmin())return true;
  return G.players[cp.p]&&G.players[cp.p].name===LS.myName;
}
async function pick(tid){
  if(!canPickNow())return;
  const cp=curPick();
  if(G.picks[tid]!==undefined||T[tid].tier!==cp.t)return;
  await mutate(g=>{
    const c=(function(){const sq=draftSeq();return g.pickLog.length<sq.length?sq[g.pickLog.length]:null;})();
    if(!c||T[tid].tier!==c.t||g.picks[tid]!==undefined)return;
    g.picks[tid]=c.p;g.pickLog.push(tid);
    if(g.pickLog.length>=draftSeq().length){g.phase='play';}
  });
  if(G.phase==='play'){LS.tab='play';saveLocal();render();}
}
async function latePick(tid){
  const mi=myIdx();if(mi<0)return;
  if(G.phase!=='play')return;
  if(!T[tid]||G.picks[tid]!==undefined)return;
  const tier=T[tid].tier;
  const mineNow=Object.keys(G.picks).filter(function(t){return G.picks[t]===mi;});
  if(mineNow.length>=3)return;
  if(mineNow.some(function(t){return T[t]&&T[t].tier===tier;}))return;
  await mutate(function(g){
    if(g.picks[tid]!==undefined)return;
    const mine=Object.keys(g.picks).filter(function(t){return g.picks[t]===mi;});
    if(mine.length>=3)return;
    if(mine.some(function(t){return T[t]&&T[t].tier===tier;}))return;
    g.picks[tid]=mi;
    if(!g.pickLog.includes(tid))g.pickLog.push(tid);
  });
  render();
}

/* ================= РЕЗУЛЬТАТЫ (ESPN) ================= */
function stageOf(ev){
  const s=((ev.season&&ev.season.slug)||'').toLowerCase();
  if(s.indexOf('group')>=0)return 'group';
  if(s.indexOf('32')>=0)return 'r32';
  if(s.indexOf('16')>=0)return 'r16';
  if(s.indexOf('quarter')>=0)return 'qf';
  if(s.indexOf('semi')>=0)return 'sf';
  if(s.indexOf('third')>=0||s.indexOf('3rd')>=0)return 'third';
  if(s.indexOf('final')>=0)return 'final';
  const d=(ev.date||'').slice(0,10);
  if(d<='2026-06-27')return 'group';
  if(d<='2026-07-03')return 'r32';
  if(d<='2026-07-08')return 'r16';
  if(d<='2026-07-13')return 'qf';
  if(d<='2026-07-16')return 'sf';
  if(d==='2026-07-18')return 'third';
  return 'final';
}
function applyEventsTo(g,evs){
  const res={},matches=[],koFix=[];
  const gt=tid=>res[tid]||(res[tid]={gw:0,gd:0,ko:false,w32:false,w16:false,wqf:false,wsf:false,wf:false});
  let cnt=0;
  evs.forEach(ev=>{
    const st=stageOf(ev);if(st==='third')return;
    const comp=(ev.competitions&&ev.competitions[0])||{};
    const cs=comp.competitors||[];if(cs.length<2)return;
    const ids=cs.map(c=>matchTeam(c.team&&c.team.displayName));
    let kf=null;
    if(st!=='group'){ids.forEach(id=>{if(id)gt(id).ko=true;});if(ids[0]&&ids[1]){kf={st:st,a:ids[0],b:ids[1],w:null};koFix.push(kf);}}
    const done=!!(comp.status&&comp.status.type&&comp.status.type.completed)||
               !!(ev.status&&ev.status.type&&ev.status.type.completed);
    if(!done)return;
    cnt++;
    let wi=cs.findIndex(c=>c.winner===true);
    if(wi<0){
      const sc=c=>parseFloat(c.score||0)+(parseFloat(c.shootoutScore||0))/100;
      const a=sc(cs[0]),b=sc(cs[1]);
      if(a!==b)wi=a>b?0:1;
    }
    if(kf&&wi>=0&&ids[wi])kf.w=ids[wi];
    matches.push({d:(ev.date||'').slice(5,10),n:ev.name||'',s:cs.map(c=>c.score||'').join(' : '),st:st,
      a:ids[0]||null,b:ids[1]||null,w:(wi>=0?(ids[wi]||null):null)});
    if(st==='group'){
      if(wi<0)ids.forEach(id=>{if(id)gt(id).gd++;});
      else if(ids[wi])gt(ids[wi]).gw++;
    }else{
      const key={r32:'w32',r16:'w16',qf:'wqf',sf:'wsf','final':'wf'}[st];
      if(wi>=0&&ids[wi]&&key)gt(ids[wi])[key]=true;
    }
  });
  g.res=res;g.matches=matches.reverse();g.koFix=koFix;
  return cnt;
}
async function syncResults(){
  setMsg('Загружаю результаты…');render();
  try{
    const url='https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260720&limit=500';
    const resp=await fetch(url);
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const data=await resp.json();
    let n=0;
    await mutate(g=>{n=applyEventsTo(g,data.events||[]);g.lastSync=Date.now();});
    setMsg('Обновлено: учтено завершённых матчей — '+n+'.');
  }catch(e){
    setMsg('Не удалось загрузить ('+e.message+'). Попробуйте позже или внесите результаты вручную.',true);
  }
  render();
}

const C_FIRST=['{n} открыл счёт — первые {p}! С почином','{n} наконец размочил счёт: {p}. Поехали','{n}: {p} — первые очки в копилке, не последние','{n} распечатал ноль и взял {p}','{n}: {p}. Лёд тронулся','{n} забрал {p} — первый блин не комом','{n} вышел из сумрака: {p}'];

const C_SURPRISE=['{n} в шоке: кто бы мог подумать, что {t} так выстрелит ({p})','{n} поднимает {p} — внезапно тащит {t}, никто не ставил','у {n} {t} решила, что тоже умеет в футбол: {p}','{n}: тёмная лошадка {t} оправдывает доверие ({p})','{n} с {p} — спасибо {t}, главный сюрприз тура'];
function pickPhrase(pool,pn,seed,used){let h=2166136261>>>0;for(let i=0;i<seed.length;i++){h=(h^seed.charCodeAt(i))>>>0;h=Math.imul(h,16777619)>>>0;}let idx=h%pool.length;if(used){let g=0;while(used.has(pn+idx)&&g<pool.length){idx=(idx+1)%pool.length;g++;}used.add(pn+idx);}return pool[idx];}
function itogiLine(seg,x,rank,pts,sp,tps,used){
  const v=x.v,i=x.i;
  let before=0;for(const s of ITOGI_ORDER){if(s===seg)break;before+=(sp[s]&&sp[s][i])||0;}
  let surprise=null;
  if(tps[seg]){let best=null,bv=-1;for(const tid in tps[seg]){if(G.picks[tid]===i&&tps[seg][tid]>bv){bv=tps[seg][tid];best=tid;}}if(best&&bv>0&&T[best]&&T[best].tier==='C')surprise=flagHtml(T[best])+' '+esc(T[best].ru);}
  let pool,pn,emo;
  if(before===0&&v>0){pool=C_FIRST;pn='FST';emo='🎉';}
  else if(surprise&&v>0){pool=C_SURPRISE;pn='SUR';emo='🤯';}
  else if(rank===0&&v>0&&(pts.length<2||v>pts[1].v)){pool=C_TOP;pn='TOP';emo='🔥';}
  else if(v>0){pool=C_GOOD;pn='GD';emo='👍';}
  else if(before>0){pool=C_ZERO;pn='ZR';emo='😐';}
  else{pool=C_STILLZERO;pn='SZ';emo='🧊';}
  let s=pickPhrase(pool,pn,seg+x.name+v,used);
  s=s.replace(/\{n\}/g,'<b>'+esc(x.name)+'</b>').replace(/\{p\}/g,'+'+v).replace(/\{t\}/g,surprise||'');
  return '<div>'+emo+' '+s+'</div>';
}
function phr(arr,seed){let s=0;for(let i=0;i<seed.length;i++)s+=seed.charCodeAt(i);return arr[s%arr.length];}
function segOfMatch(m){if(m.st==='group'){if(m.d<='06-17')return 't1';if(m.d<='06-23')return 't2';return 't3';}return m.st;}

  function mp(tid,m){var t=T[tid];if(!t)return 0;var tr=t.tier;if(m.w===tid)return P.gw[tr];if(!m.w)return P.gd[tr];return 0;}

  function pick(arr,seed,used){var h=0;for(var i=0;i<seed.length;i++)h=(h*31+seed.charCodeAt(i))>>>0;var idx=h%arr.length;if(used){var g=0;while(used.has(arr[idx])&&g<arr.length){idx=(idx+1)%arr.length;g++;}used.add(arr[idx]);}return arr[idx];}
  function fill(tpl,o,p){var s=tpl.replace('{o}',gold(o));if(p!=null&&p>0)s+=' <span style="color:var(--mut)">(+'+p+')</span>';return s;}
  var VD=['фейк-фаворит','осечка фаворита','где деньги, фаворит?','фаворит сдулся','фаворит опозорился','докатились','фаворит картонный','зевок фаворита'];

  var VN=['по делу','без нервов','ожидаемо','чётко'];
  var IBlow=['всё горит у {o} 🔥','{o}, твои вообще играть умеют?','{o} слил на ровном месте','позорник {o}','{o} рвёт на себе волосы','{o} проклинает драфт','фавориты {o} — фейк','{o}, соболезнуем','{o} в истерике','{o} сдулся со своими','{o} ищет кого винить'];
  var IBoon=['{o} — король помоек','{o} нафартил на пустом месте','везёт дуракам, {o}','{o} в шоколаде, сам не понял как','{o} украл очки, наглец','лудоманский фарт {o}','{o} ржёт над всеми','{o} не по таланту нахватал'];
  var IWin=['{o} забрал без понтов','у {o} всё ровно','{o} доволен как удав','рабочий день {o}','{o} не парится'];
  var IDud=['{o} в пролёте','мимо кассы, {o}','{o} опять ни с чем','{o}, ну ты понял','пусто у {o}'];
  var IDraw=['{o} забрал очко','{o} не в обиде','ничья — и ладно, {o}','{o} поделил очки'];
  var VSELF=['внутренние разборки','сам с собой','междусобойчик','семейное дерби','битва за свой же банк'];
  var ISELF=['обе же {o} — очки никуда не делись','{o} обыграл сам себя','у {o} обе, куда ни кинь — свои','{o} сам себе соперник','{o} забрал у самого себя'];
  function line(m,used){
    if(!(m&&m.a&&m.b)||typeof m.s!=='string'||m.s.indexOf(':')<0)return null;
    var sa=ST[T[m.a].tier],sb=ST[T[m.b].tier];
    var fav=sa>=sb?m.a:m.b, und=fav===m.a?m.b:m.a, gap=Math.abs(sa-sb);
    var oFav=own(fav), oUnd=own(und);
    if(!oFav&&!oUnd)return null;
    var sc=m.s.replace(/ /g,''), drew=!m.w, undWon=m.w===und, favWon=m.w===fav;
    var gd=Math.abs((+sc.split(':')[0])-(+sc.split(':')[1]));
    var score=nm(m.a)+' '+sc+' '+nm(m.b);
    var emoji,verdict,s=0,imp=[];
    if(oFav&&oUnd&&oFav===oUnd){var o2=oFav,tot=mp(fav,m)+mp(und,m);emoji='🪞';verdict=pick(VSELF,sc+nm(fav),used);imp.push(cap(fill(pick(ISELF,o2+sc,used),o2,tot)));}else if(gap>=1&&(drew||undWon)){
      s=gap+(undWon?2:0); emoji=undWon?'😱':(gap>=2?'🤯':'🫣');
      verdict=undWon?pick(VW,sc+nm(fav),used):pick(VD,sc+nm(fav),used);
      if(oFav)imp.push(cap(fill(pick(IBlow,oFav+sc,used),oFav,mp(fav,m))));
      if(oUnd)imp.push(cap(fill(pick(IBoon,oUnd+sc,used),oUnd,mp(und,m))));
    } else if(favWon){
      var big=gd>=3; s=big?1:0; emoji=big?'🔥':'✅';
      verdict=big?pick(VB,sc+nm(fav),used):pick(VN,sc+nm(fav),used);
      if(oFav)imp.push(cap(fill(pick(IWin,oFav,used),oFav,mp(fav,m))));
      if(oUnd)imp.push(cap(fill(pick(IDud,oUnd,used),oUnd,null)));
    } else {
      emoji='⚪'; verdict='ровный расклад'; s=0; var w=m.w;
      if(w){var l=w===m.a?m.b:m.a; if(own(w))imp.push(cap(fill(pick(IWin,own(w),used),own(w),mp(w,m)))); if(own(l))imp.push(cap(fill(pick(IDud,own(l),used),own(l),null)));}
      else {if(own(m.a))imp.push(cap(fill(pick(IDraw,own(m.a)+sc,used),own(m.a),mp(m.a,m)))); if(own(m.b))imp.push(cap(fill(pick(IDraw,own(m.b)+sc,used),own(m.b),mp(m.b,m))));}
    }
    var t=emoji+' '+score;
    if(verdict)t+=' — <span style="color:var(--mut)">'+verdict+'.</span>';
    if(imp.length)t+=' '+imp.join('; ')+'.';
    return {s:s,txt:t};
  }
  function dayPts(ms){
    var tally={};
    ms.forEach(function(m){
      if(!(m&&m.a&&m.b)||typeof m.s!=='string'||m.s.indexOf(':')<0)return;
      [m.a,m.b].forEach(function(tid){var o=own(tid);if(o)tally[o]=(tally[o]||0)+mp(tid,m);});
    });
    var arr=Object.keys(tally).map(function(o){return [o,tally[o]];}).sort(function(a,b){return b[1]-a[1];});
    return arr.map(function(x){return x[0]+' +'+x[1];}).join(' · ');
  }
  function dayLabel(d){var p=String(d).split('-');return parseInt(p[1],10)+' '+(MON[p[0]]||p[0]);}
  var byDay={};
  (G.matches||[]).forEach(function(m){if(m&&m.a&&m.b)(byDay[m.d]=byDay[m.d]||[]).push(m);});
  var daysDesc=Object.keys(byDay).sort().reverse();
  var shared=new Set(), blocks=[];
  for(var i2=0;i2<daysDesc.length&&blocks.length<2;i2++){
    var d=daysDesc[i2];
    var ls=byDay[d].map(function(m){return line(m,shared);}).filter(Boolean);
    if(ls.length){
      ls.sort(function(a,b){return b.s-a.s;});
      blocks.push({d:d, lines:ls.map(function(x){return x.txt;}), pts:dayPts(byDay[d])});
    }
  }
  if(!blocks.length)return '';
  var html='';
  blocks.forEach(function(b,idx){
    var head='📅 '+dayLabel(b.d);
    var body='<div style="display:flex;flex-direction:column;gap:8px;font-size:14px;line-height:1.45">'+b.lines.map(function(t){return '<div>'+t+'</div>';}).join('')+'</div>';
    var pts=b.pts?'<div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--line);font-size:12px;color:var(--mut)">За день: '+b.pts+'</div>':'';
    if(idx===0){
      html+='<div class="seg"><div class="seghead">'+head+'</div>'+body+pts+'</div>';
    } else {
      html+='<details class="seg"><summary class="seghead" style="cursor:pointer;list-style:none">'+head+' <span style="color:var(--mut);font-weight:400;font-size:12px">— раскрыть</span></summary><div style="margin-top:8px">'+body+pts+'</div></details>';
    }
  });
  return '<div class="card"><h2>🎭 Итоги дня</h2>'+html+'</div>';
}

function inviteText(){
  if(!LS.room)return '';
  if(location.protocol.indexOf('http')===0){
    return location.origin+location.pathname+'?room='+LS.room;
  }

}
function copyInvite(){
  const txt=inviteText();

  try{document.execCommand('copy');setMsg('Скопировано: '+txt);}catch(e){setMsg('Скопируйте вручную: '+txt);}
  document.body.removeChild(ta);render();

function exportState(){
  const code=btoa(unescape(encodeURIComponent(JSON.stringify(G))));
  const ta=document.getElementById('excode');
  if(ta){ta.value=code;ta.select();try{document.execCommand('copy');setMsg('Код состояния скопирован.');}catch(e){}render();
    const t2=document.getElementById('excode');if(t2)t2.value=code;}
}
function importState(){
  const ta=document.getElementById('excode');if(!ta||!ta.value.trim())return;
  try{
    const obj=JSON.parse(decodeURIComponent(escape(atob(ta.value.trim()))));
    if(!obj.players)throw new Error('bad');
    mutate(g=>{Object.assign(g,obj);});
    setMsg('Состояние импортировано.');render();
  }catch(e){alert('Не удалось прочитать код.');}
}

  return '<div style="max-width:480px;margin:0 auto"><div class="card"><h2>🏆 Плей-офф</h2>'+bracketFocus()+'</div>'+pathsHtml()+'</div>';
}

function viewRules(){
  const rows=[['Победа в группе','gw'],['Ничья в группе','gd'],['Выход в плей-офф','ko'],
   ['Победа в 1/16','w32'],['Победа в 1/8','w16'],['Победа в 1/4','wqf'],['Победа в 1/2','wsf'],['Победа в финале','wf']];
  return '<div class="card"><h2>Правила</h2><div class="hint" style="font-size:14px;line-height:1.6">'+
   '1. Каждый вносит взнос — банк забирает победитель по очкам после финала 19 июля.<br>'+
   '2. Команды разбиты на корзины по букмекерским коэффициентам: <span class="tierbadge bA">A</span> фавориты, '+
   '<span class="tierbadge bB">B</span> претенденты, <span class="tierbadge bC">C</span> тёмные лошадки.<br>'+
   '3. Драфт-змейка: раунд 1 — корзина A по жребию, раунд 2 — корзина B в обратном порядке, раунд 3 — корзина C снова по порядку. У каждого 3 сборные.<br>'+
   '4. Очки начисляются за каждую сборную портфеля по таблице ниже. Матч за 3-е место не учитывается.<br>'+
   '5. Тай-брейк: больше очков от команды корзины C; затем — точный счёт финала, указанный при регистрации.</div>'+
   '<table class="ptable"><tr><th>Событие</th><th>A</th><th>B</th><th>C</th></tr>'+
   rows.map(r=>'<tr><td>'+r[0]+'</td><td>'+P[r[1]].A+'</td><td>'+P[r[1]].B+'</td><td>'+P[r[1]].C+'</td></tr>').join('')+
   '</table>'+
   '<h3>Баланс</h3><div class="hint">Фаворит-чемпион ≈ 54 очка. Команде из B для того же нужен титул (75), лошадке из C — минимум финал. Сенсации вознаграждаются, фавориты не обесценены.</div>'+
   '<h3>Корзины (коэффициенты FanDuel, июнь 2026)</h3>'+
   '<div class="hint"><b>A:</b> Испания, Франция, Англия, Бразилия, Аргентина, Португалия<br>'+
   '<b>B:</b> Германия, Нидерланды, Норвегия, Бельгия, Колумбия, Марокко, Уругвай<br>'+
   '<b>C:</b> остальные 35 сборных</div>'+
   '<h3>Как устроена комната</h3>'+
   '<div class="hint">Игра хранится в бесплатном JSON-облаке (kvdb.io) — без серверов и аккаунтов, организатору нужен только email. Организатор создаёт комнату и рассылает код или ссылку, участники регистрируются сами. Страница синхронизируется каждые 15 секунд. Резервная копия — «Экспорт состояния» в Лобби. Каждый участник выбирает сборные со своего устройства, когда подходит его очередь.</div></div>';
}


const EXP=new Set();
function toggleExpand(tid){EXP.has(tid)?EXP.delete(tid):EXP.add(tid);render();}
let upcomingMatches=[];
let upcomingOpen=false;
function toggleUpcoming(){upcomingOpen=!upcomingOpen;render();}
let bst=-1;function setBst(v){bst=v;render();}
function pendingTeams(){
  const s=new Set();
  if(!G||G.phase!=='play'||!Array.isArray(upcomingMatches))return s;
  const ORDER=['t1','t2','t3','r32','r16','qf','sf','final'];
  const today=new Date().toISOString().slice(5,10);
  const endD={t1:'06-17',t2:'06-23',t3:'06-27'};
  const exp={r32:16,r16:8,qf:4,sf:2,'final':1};
  const segCount={};
  (G.matches||[]).forEach(m=>{ if(!m.a&&!m.b)return; const sg=segOfMatch(m); segCount[sg]=(segCount[sg]||0)+1; });
  const isFin=(seg)=>endD[seg]?(today>endD[seg]):((segCount[seg]||0)>=(exp[seg]||999));
  let curTour=null;
  for(const seg of ORDER){ if(!isFin(seg)){curTour=seg;break;} }
  if(!curTour)return s;
  upcomingMatches.forEach(m=>{
    if(m.live)return;
    const sg=segOfMatch({st:m.st,d:(m.date||'').slice(5,10)});
    if(sg===curTour){ if(m.a)s.add(m.a); if(m.b)s.add(m.b); }
  });
  return s;
}
async function fetchUpcoming(){
  if(!G||G.phase!=='play')return;
  try{
    const today=new Date();
    const from=new Date(today.getTime()-86400000).toISOString().slice(0,10).replace(/-/g,'');
    const toD=new Date(today.getTime()+14*86400000).toISOString().slice(0,10).replace(/-/g,'');
    const url='https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates='+from+'-'+toD+'&limit=200';
    const data=await fetch(url).then(r=>r.json());
    const now=Date.now();
    upcomingMatches=(data.events||[]).filter(ev=>{
      const comp=(ev.competitions&&ev.competitions[0])||{};
      if(comp.status&&comp.status.type&&comp.status.type.completed)return false;
      if(!(comp.status&&comp.status.type&&comp.status.type.state==='in')&&new Date(ev.date).getTime()<now-3600000)return false;
      const ids=(comp.competitors||[]).map(c=>matchTeam(c.team&&c.team.displayName));
      return ids.some(id=>id&&G.picks[id]!==undefined);
    }).slice(0,20).map(ev=>{
      const comp=(ev.competitions&&ev.competitions[0])||{};
      const cs=comp.competitors||[];
      const ids=cs.map(c=>matchTeam(c.team&&c.team.displayName));
      const live=!!(comp.status&&comp.status.type&&comp.status.type.state==='in');
      const sc0=cs[0]?cs[0].score||'0':'0';
      const sc1=cs[1]?cs[1].score||'0':'0';
      const minute=(comp.status&&comp.status.displayClock)||'';
      return {date:ev.date,a:ids[0]||null,b:ids[1]||null,st:stageOf(ev),live,score:sc0+':'+sc1,minute};
    });
    render();
  }catch(e){}
}

/* ================= ДЕТАЛИ МАТЧЕЙ КОМАНДЫ ================= */
function teamMatchesHtml(tid){
  const t=T[tid],r=G.res[tid]||{};
  const ms=(G.matches||[]).filter(m=>m.a===tid||m.b===tid);
  if(!ms.length)return '<div style="font-size:12px;color:var(--mut);padding:4px 12px">Матчи ещё не сыграны</div>';
  let rows='';
  if(r.ko){rows+='<div style="font-size:12px;padding:4px 10px;color:var(--ok)">⚡ Выход в плей-офф: +'+P.ko[t.tier]+'</div>';}
  ms.forEach(m=>{
    const opp=T[m.a===tid?m.b:m.a];
    let pts=0;
    if(m.st==='group'){
      if(m.w===tid)pts=P.gw[t.tier];
      else if(!m.w)pts=P.gd[t.tier];
    }else{
      if(m.w===tid){const key={r32:'w32',r16:'w16',qf:'wqf',sf:'wsf','final':'wf'}[m.st];if(key)pts=P[key][t.tier];}
    }
    const win=m.w===tid,loss=!!(m.w&&m.w!==tid);
    rows+='<div style="display:flex;align-items:center;gap:6px;font-size:12px;padding:3px 10px;border-bottom:1px solid rgba(255,255,255,0.05)">'+
      '<span style="color:var(--mut);white-space:nowrap;flex-shrink:0">'+esc(m.d)+'</span>'+
      '<span style="font-weight:700;width:14px;color:'+(win?'var(--ok)':loss?'var(--red)':'var(--mut)')+'">'+(win?'В':loss?'П':'Н')+'</span>'+
      (opp?'<span>'+flagHtml(opp)+' '+esc(opp.ru)+'</span>':'<span style="color:var(--mut)">—</span>')+
      '<span style="color:var(--mut)">'+esc(m.s)+'</span>'+
      '<span style="margin-left:auto;font-weight:600;color:'+(pts>0?'var(--ok)':'var(--mut)')+'">'+
      (pts>0?'+'+pts:'—')+'</span></div>';
  });
  return '<div style="background:var(--bg);border-radius:8px;margin:6px 2px 4px;overflow:hidden">'+rows+'</div>';
}

/* ================= ПРЕДСТОЯЩИЕ МАТЧИ ================= */
function upcomingHtml(){
  if(!upcomingMatches.length)return '';
  const liveMs=upcomingMatches.filter(m=>m.live);
  const upMs=upcomingMatches.filter(m=>!m.live);
  if(!liveMs.length&&!upMs.length)return '';
  const isPvp=m=>{
    const pA=m.a!==null&&G.picks[m.a]!==undefined?G.picks[m.a]:-1;
    const pB=m.b!==null&&G.picks[m.b]!==undefined?G.picks[m.b]:-1;
    return pA>=0&&pB>=0&&pA!==pB;
  };
  function tSpan(tid,pi){
    return (tid&&T[tid]?flagHtml(T[tid])+' <b style="font-size:13px">'+esc(T[tid].ru)+'</b>':'?')+
           (pi>=0?'<span style="font-size:11px;color:var(--gold)">('+esc((G.players[pi]||{}).name||'')+')</span>':'');
  }
  function mRow(m){
    const pA=m.a!==null&&G.picks[m.a]!==undefined?G.picks[m.a]:-1;
    const pB=m.b!==null&&G.picks[m.b]!==undefined?G.picks[m.b]:-1;
    const pvp=pA>=0&&pB>=0&&pA!==pB;
    const dt=new Date(m.date);
    const msk=dt.toLocaleString('ru-RU',{timeZone:'Europe/Moscow',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    let sa='',sb='';
    if(m.live&&m.score&&m.score.indexOf(':')>=0){const ps=m.score.split(':');sa=(ps[0]||'').trim();sb=(ps[1]||'').trim();}
    const min=m.minute?(''+m.minute).replace(/'+$/,''):'';
    const card=m.live?'background:rgba(224,122,106,0.12);border:1px solid rgba(224,122,106,0.45);border-radius:10px;padding:8px 11px;margin-bottom:7px':pvp?'background:rgba(232,196,107,0.10);border:1px solid var(--gold);border-radius:10px;padding:8px 11px;margin-bottom:7px':'border-bottom:1px solid var(--line);padding:7px 2px';
    const head=m.live?'<span style="color:var(--red);font-weight:700;font-size:11px;letter-spacing:.3px">● LIVE'+(min?' · '+esc(min)+"'":'')+'</span>':'<span style="color:var(--mut);font-size:11px">'+esc(msk)+' МСК</span>';
    function tline(tid,pi,sc){
      const nm='<span style="display:inline-flex;align-items:center;gap:6px;min-width:0">'+((tid&&T[tid])?flagHtml(T[tid])+'<b style="font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(T[tid].ru)+'</b>':'<b style="color:var(--mut)">—</b>')+'</span>';
      const own=pi>=0?esc((G.players[pi]||{}).name||''):'';
      let r='<div style="display:flex;align-items:center;padding:3px 0;min-width:0">'+nm;
      if(sc!==''){ if(own)r+='<span style="font-size:11px;color:var(--gold);font-weight:600;white-space:nowrap;margin-left:6px">'+own+'</span>'; r+='<b style="font-size:17px;margin-left:auto;padding-left:10px">'+esc(sc)+'</b>'; }
      else if(own){ r+='<span style="font-size:11px;color:var(--gold);font-weight:600;white-space:nowrap;margin-left:auto;padding-left:8px">'+own+'</span>'; }
      r+='</div>';
      return r;
    }
    let h='<div style="'+card+'">';
    h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">'+head+(pvp?'<span style="font-size:12px">⚔️</span>':'')+'</div>';
    h+=tline(m.a,pA,sa);
    h+=tline(m.b,pB,sb);
    h+='</div>';
    return h;
  }
  let h='<div class="card">';
  if(liveMs.length){
    h+='<h2 style="margin-bottom:8px">🔴 Идут сейчас</h2>';
    liveMs.forEach(m=>{h+=mRow(m);});
    if(upMs.length)h+='<div style="margin:10px 0 0"></div>';
  }
  if(upMs.length){
    const n=upMs.length;
    const hasPvp=upMs.some(isPvp);
    const form=n===1?'матч':n<5?'матча':'матчей';
    const summary=(hasPvp?'⚔️ есть дуэли · ':'')+n+' '+form;
    h+='<div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:6px 0;border-top:'+(liveMs.length?'1px solid var(--line)':'none')+'" onclick="toggleUpcoming()">'+
       '<h2 style="margin:0;font-size:15px">📅 Предстоящие <span style="font-size:12px;font-weight:400;color:var(--mut)">('+summary+')</span></h2>'+
       '<span style="color:var(--mut);font-size:13px;margin-left:8px">'+(upcomingOpen?'▲':'▼')+'</span></div>';
    if(upcomingOpen){
      const pvpMs=upMs.filter(isPvp);
      const rest=upMs.filter(m=>!isPvp(m));
      if(pvpMs.length){h+='<div class="hint" style="color:var(--gold);font-weight:600;margin:4px 0">⚔️ Дуэли игроков</div>';pvpMs.forEach(m=>{h+=mRow(m);});}
      if(rest.length){if(pvpMs.length)h+='<div class="hint" style="margin:8px 0 4px">Другие матчи</div>';rest.forEach(m=>{h+=mRow(m);});}
    }
  }
  h+='<button class="btn sec mini" style="margin-top:8px" onclick="fetchUpcoming()">⟳ Обновить</button></div>';
  return h;
}

function render(){
  document.getElementById('tabs').innerHTML=tabsHtml();
  document.getElementById('hdr').innerHTML=hdrHtml();
  const v={lobby:viewLobby,draft:viewDraft,play:viewPlay,playoff:viewPlayoff,rules:viewRules}[LS.tab]||viewLobby;
  document.getElementById('app').innerHTML=myPanelHtml()+latePickHtml()+v();
}

  loadLocal();
  let qroom='';
  try{qroom=new URLSearchParams(location.search).get('room')||'';}catch(e){}
